<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <title>SEQ2 server</title>
      </head>
      <body>
          <h1>SEQ2 server</h1>
          <p> Access to the server </p>
          <hr>
          <form action="ping" method="get">
              <p> Is the server alive? <input type="submit" value="PING"></p>
          <hr>
          </form>
          <form action="get" method="get">
              <p> Get a Sequence. Select sequence number
              <select name="n">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
              </select><input type="submit" value="GET"></p>
          </form>
          <hr>
          <form action="gene" method="get">
              <p>Get a Gene. Select the name
              <select name="name">
                <option value="ADA">ADA</option>
                <option value="FRAT1">FRAT1</option>
                <option value="FXN">FXN</option>
                <option value="RNU6_269P">RNU6_269P</option>
                <option value="U5">U5</option>
              </select><input type="submit" value="GENE"></p>
          </form>



          <hr>
          <form action="operation" method="get">
              <p>Enter sequence:
              <input type="text" name="seq"></p>

                <p>Select operation:
                <select name="op">
                    <option value="1">Info</option>
                    <option value="2">Complement</option>
                    <option value="3">Reverse</option>
                </select></p>

                <input type="submit" value="RUN">
            </form>
      </body>
    </html>
